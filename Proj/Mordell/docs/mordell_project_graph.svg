<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="980" viewBox="0 0 1440 980">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#263238"/>
    </marker>
    <style>
      text { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans CJK SC", "Microsoft YaHei", sans-serif; fill: #17212b; }
      .title { font-size: 32px; font-weight: 700; }
      .subtitle { font-size: 16px; fill: #4d5b66; }
      .cluster-title { font-size: 18px; font-weight: 700; fill: #2b3a42; }
      .module { font-size: 18px; font-weight: 700; }
      .desc { font-size: 14px; fill: #37474f; }
      .small { font-size: 12px; fill: #60717a; }
      .edge { stroke: #263238; stroke-width: 2.2; fill: none; marker-end: url(#arrow); }
      .soft-edge { stroke: #697982; stroke-width: 1.8; fill: none; marker-end: url(#arrow); stroke-dasharray: 7 5; }
      .cluster { fill: #f7f8fb; stroke: #8a98a3; stroke-width: 1.5; stroke-dasharray: 8 6; rx: 16; }
      .box { stroke: #34444f; stroke-width: 1.4; rx: 12; }
      .foundation { fill: #e8f5ff; }
      .engine { fill: #e8f8ec; }
      .arithmetic { fill: #fff6dd; }
      .final { fill: #ffe9e9; }
      .api { fill: #f1ecff; }
    </style>
  </defs>

  <rect x="0" y="0" width="1440" height="980" fill="#ffffff"/>
  <text x="60" y="62" class="title">Mordell Lean4 项目证明结构图</text>
  <text x="60" y="92" class="subtitle">对象：整数 Mordell 方程 y² = x³ + d；核心策略：二次整数环中的理想下降 + 小类数输入 + 参数化排除。</text>

  <rect x="42" y="126" width="282" height="390" class="cluster"/>
  <text x="66" y="158" class="cluster-title">基础层</text>

  <rect x="72" y="185" width="222" height="120" class="box foundation"/>
  <text x="94" y="220" class="module">ZsqrtdBasic.lean</text>
  <text x="94" y="249" class="desc">ℤ√d 与 QuadRat d</text>
  <text x="94" y="273" class="desc">trace / norm / basis / finite module</text>

  <rect x="72" y="342" width="222" height="118" class="box foundation"/>
  <text x="94" y="376" class="module">EuclideanNegTwo.lean</text>
  <text x="94" y="405" class="desc">ℤ√(-2) 的除法算法</text>
  <text x="94" y="429" class="desc">EuclideanDomain 实例</text>

  <rect x="366" y="126" width="310" height="596" class="cluster"/>
  <text x="390" y="158" class="cluster-title">通用数论工具</text>

  <rect x="410" y="188" width="220" height="112" class="box engine"/>
  <text x="432" y="222" class="module">Approximation.lean</text>
  <text x="432" y="251" class="desc">有理数取整逼近</text>
  <text x="432" y="275" class="desc">d = -5,-6,-13 的范数估计</text>

  <rect x="410" y="350" width="220" height="112" class="box engine"/>
  <text x="432" y="384" class="module">Dedekind.lean</text>
  <text x="432" y="413" class="desc">ℤ√d 是整环</text>
  <text x="432" y="437" class="desc">squarefree + mod 条件推出 Dedekind</text>

  <rect x="410" y="560" width="220" height="116" class="box engine"/>
  <text x="432" y="594" class="module">ClassGroupApprox.lean</text>
  <text x="432" y="623" class="desc">类群代表压缩准则</text>
  <text x="432" y="647" class="desc">mk0 代表含 2 或 12</text>

  <rect x="722" y="126" width="330" height="430" class="cluster"/>
  <text x="746" y="158" class="cluster-title">理想下降核心</text>

  <rect x="775" y="210" width="224" height="248" class="box arithmetic"/>
  <text x="797" y="244" class="module">Descent.lean</text>
  <text x="797" y="276" class="desc">factor_y_sq_sub_d</text>
  <text x="797" y="300" class="desc">span(y+√d) 与 span(y-√d) 互素</text>
  <text x="797" y="324" class="desc">ideal cube ⇒ principal cube root</text>
  <text x="797" y="348" class="desc">mordell_d</text>
  <text x="797" y="372" class="small">若 gcd(classNumber d,3)=1：</text>
  <text x="797" y="394" class="small">d = 1 - 3m² 或 -1 - 3m²</text>
  <text x="797" y="416" class="small">y = m(3d + m²)</text>

  <rect x="1090" y="126" width="308" height="678" class="cluster"/>
  <text x="1114" y="158" class="cluster-title">具体输入与最终结论</text>

  <rect x="1134" y="196" width="220" height="176" class="box final"/>
  <text x="1156" y="230" class="module">ClassNumberSmall.lean</text>
  <text x="1156" y="260" class="desc">d = -1,-2 类数为 1</text>
  <text x="1156" y="284" class="desc">d = -5,-6,-13 类群 ≤ 2</text>
  <text x="1156" y="308" class="desc">gcd(classNumber d,3)=1</text>
  <text x="1156" y="332" class="small">并给出 -1,-2 的 cube-root 特例</text>

  <rect x="1134" y="428" width="220" height="126" class="box api"/>
  <text x="1156" y="462" class="module">Extensions.lean</text>
  <text x="1156" y="492" class="desc">mordell_d_solution_iff</text>
  <text x="1156" y="516" class="desc">无解判别准则</text>

  <rect x="1134" y="612" width="220" height="140" class="box final"/>
  <text x="1156" y="646" class="module">Solutions.lean</text>
  <text x="1156" y="676" class="desc">d = -1: (1,0)</text>
  <text x="1156" y="700" class="desc">d = -2: (3,±5)</text>
  <text x="1156" y="724" class="desc">d = -13: (17,±70)</text>
  <text x="1156" y="748" class="desc">d = -5,-6: 无整数解</text>

  <rect x="590" y="790" width="250" height="92" class="box api"/>
  <text x="612" y="824" class="module">Basic.lean / Mordell.lean</text>
  <text x="612" y="854" class="desc">聚合导出项目主要模块</text>

  <path class="edge" d="M294 245 C340 245, 360 244, 410 244"/>
  <path class="edge" d="M294 245 C342 290, 360 398, 410 406"/>
  <path class="edge" d="M520 300 L520 350"/>
  <path class="edge" d="M520 462 L520 560"/>
  <path class="edge" d="M630 618 C690 610, 720 430, 775 388"/>
  <path class="edge" d="M630 406 C690 395, 720 375, 775 354"/>
  <path class="edge" d="M999 334 C1050 318, 1082 292, 1134 284"/>
  <path class="edge" d="M294 401 C620 472, 742 192, 1134 230"/>
  <path class="edge" d="M999 334 C1050 380, 1082 462, 1134 491"/>
  <path class="edge" d="M1354 284 C1390 410, 1390 620, 1354 682"/>
  <path class="edge" d="M999 334 C1060 450, 1078 622, 1134 682"/>
  <path class="soft-edge" d="M1244 554 L1244 612"/>
  <path class="soft-edge" d="M183 460 C230 730, 410 830, 590 836"/>
  <path class="soft-edge" d="M520 676 C555 735, 594 772, 655 790"/>
  <path class="soft-edge" d="M887 458 C870 642, 810 744, 760 790"/>
  <path class="soft-edge" d="M1244 752 C1120 824, 980 850, 840 836"/>

  <rect x="66" y="582" width="262" height="300" fill="#fbfcfd" stroke="#d4dbe0" stroke-width="1.2" rx="14"/>
  <text x="90" y="618" class="cluster-title">证明流向摘要</text>
  <text x="90" y="656" class="desc">1. 在 ℤ√d 中分解：</text>
  <text x="110" y="682" class="small">y² - d = (y+√d)(y-√d)</text>
  <text x="90" y="720" class="desc">2. 证明两个主理想互素</text>
  <text x="90" y="758" class="desc">3. 类数与 3 互素，推出</text>
  <text x="110" y="784" class="small">span(y+√d) 是立方</text>
  <text x="90" y="822" class="desc">4. 单位与立方展开给出</text>
  <text x="110" y="848" class="small">d = -3m² ± 1, y = m(3d+m²)</text>

  <rect x="930" y="822" width="424" height="48" fill="#fbfcfd" stroke="#d4dbe0" stroke-width="1.2" rx="12"/>
  <text x="954" y="852" class="small">实线：Lean import / 核心证明依赖；虚线：聚合导出或论文叙述层面的依赖。</text>
</svg>
