<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="860" viewBox="0 0 1200 860">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3.5" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,7 L9,3.5 z" fill="#4b5563"/>
    </marker>
    <style>
      text { font-family: -apple-system, BlinkMacSystemFont, "Noto Sans CJK SC", "Microsoft YaHei", sans-serif; fill: #111827; }
      .box { stroke: #5b6773; stroke-width: 1.5; rx: 8; }
      .blue { fill: #eef6ff; }
      .green { fill: #eefaf2; }
      .yellow { fill: #fff7df; }
      .red { fill: #fff0f0; }
      .gray { fill: #f8fafc; }
      .title { font-size: 22px; font-weight: 700; }
      .text { font-size: 17px; }
      .small { font-size: 15px; fill: #394657; }
      .formula { font-family: "Times New Roman", "Noto Serif CJK SC", serif; font-size: 20px; }
      .arrow { stroke: #4b5563; stroke-width: 2; fill: none; marker-end: url(#arrow); }
      .dash { stroke: #6b7280; stroke-width: 1.8; fill: none; stroke-dasharray: 7 5; marker-end: url(#arrow); }
    </style>
  </defs>

  <rect width="1200" height="860" fill="#ffffff"/>

  <rect x="40" y="40" width="320" height="135" class="box blue"/>
  <text x="62" y="78" class="title">整数方程与假设</text>
  <text x="62" y="112" class="formula">y² = x³ + d</text>
  <text x="62" y="140" class="small">d&lt;0，d≡2,3 (mod 4)</text>
  <text x="62" y="164" class="small">d 无平方因子，3 ∤ h(D)</text>

  <rect x="440" y="40" width="320" height="135" class="box blue"/>
  <text x="462" y="78" class="title">初等算术信息</text>
  <text x="462" y="112" class="small">由 y²-d=x³ 得 x&gt;0</text>
  <text x="462" y="136" class="small">由平方自由性得 gcd(x,y)=1</text>
  <text x="462" y="160" class="small">由模 8 分析得 x 为奇数</text>

  <rect x="840" y="40" width="320" height="135" class="box green"/>
  <text x="862" y="78" class="title">进入二次整数环</text>
  <text x="862" y="112" class="formula">D = ℤ[√d]</text>
  <text x="862" y="140" class="small">由同余和平方自由条件</text>
  <text x="862" y="164" class="small">获得 Dedekind 整环结构</text>

  <rect x="40" y="260" width="320" height="130" class="box green"/>
  <text x="62" y="298" class="title">元素分解</text>
  <text x="62" y="335" class="formula">(y+√d)(y-√d)=x³</text>
  <text x="62" y="365" class="small">把整数方程转入 D 中</text>

  <rect x="440" y="260" width="320" height="130" class="box green"/>
  <text x="462" y="298" class="title">主理想等式</text>
  <text x="462" y="332" class="small">I=&lt;y+√d&gt;，J=&lt;y-√d&gt;</text>
  <text x="462" y="358" class="formula">IJ = L³</text>

  <rect x="840" y="260" width="320" height="130" class="box green"/>
  <text x="862" y="298" class="title">互素性</text>
  <text x="862" y="330" class="small">公共素理想会推出某有理素数</text>
  <text x="862" y="354" class="small">同时整除 x 与 2y</text>
  <text x="862" y="378" class="small">与上方算术信息矛盾</text>

  <rect x="40" y="480" width="320" height="135" class="box yellow"/>
  <text x="62" y="518" class="title">理想下降</text>
  <text x="62" y="552" class="small">Dedekind 域中理想唯一分解</text>
  <text x="62" y="576" class="small">IJ=L³ 且 (I,J)=1</text>
  <text x="62" y="600" class="formula">I = 𝔞³</text>

  <rect x="440" y="480" width="320" height="135" class="box yellow"/>
  <text x="462" y="518" class="title">类群下降</text>
  <text x="462" y="552" class="formula">[𝔞]³ = 1，3 ∤ h(D)</text>
  <text x="462" y="580" class="small">推出 [𝔞]=1</text>
  <text x="462" y="604" class="small">于是 𝔞 是主理想</text>

  <rect x="840" y="480" width="320" height="135" class="box yellow"/>
  <text x="862" y="518" class="title">单位吸收</text>
  <text x="862" y="552" class="formula">y+√d = uα³</text>
  <text x="862" y="580" class="small">单位群中三次幂映射为双射</text>
  <text x="862" y="604" class="formula">y+√d = (a+b√d)³</text>

  <rect x="240" y="700" width="320" height="120" class="box red"/>
  <text x="262" y="738" class="title">展开并比较系数</text>
  <text x="262" y="772" class="formula">1 = b(3a²+b²d)</text>
  <text x="262" y="800" class="small">得到 b=±1，令 m=|a|</text>

  <rect x="640" y="700" width="320" height="120" class="box red"/>
  <text x="662" y="738" class="title">参数化结论与求解</text>
  <text x="662" y="772" class="formula">d = -3m² ± 1</text>
  <text x="662" y="798" class="formula">y = ±m(3d+m²)</text>

  <path class="arrow" d="M360 107 L440 107"/>
  <path class="arrow" d="M760 107 L840 107"/>
  <path class="arrow" d="M1000 175 C1000 220 240 220 200 260"/>
  <path class="arrow" d="M360 325 L440 325"/>
  <path class="arrow" d="M760 325 L840 325"/>
  <path class="arrow" d="M1000 390 C1000 455 240 430 200 480"/>
  <path class="arrow" d="M360 548 L440 548"/>
  <path class="arrow" d="M760 548 L840 548"/>
  <path class="arrow" d="M1000 615 C1000 675 475 660 400 700"/>
  <path class="arrow" d="M560 760 L640 760"/>

  <path class="dash" d="M600 175 C635 215 850 220 955 260"/>
  <path class="dash" d="M1000 175 L1000 260"/>
  <path class="dash" d="M600 615 C620 655 725 665 800 700"/>

  <rect x="40" y="725" width="160" height="70" class="box gray"/>
  <text x="62" y="756" class="title">Lean 对应</text>
  <text x="62" y="784" class="small">mordell_d</text>
</svg>
