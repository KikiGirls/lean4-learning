<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="480" viewBox="0 0 1200 360" role="img" aria-labelledby="title desc">
  <title id="title">AI 辅助 Lean 形式化工作流程</title>
  <desc id="desc">人类研究者、LLM 智能体和 Lean 4 验证器之间的任务、证明尝试、反馈和源码修改循环。</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#1f2937"/>
    </marker>
    <style>
      .box { fill: #ffffff; stroke: #111827; stroke-width: 2; rx: 14; }
      .label { font: 600 24px "Noto Sans SC", "PingFang SC", "Microsoft YaHei", Arial, sans-serif; fill: #111827; text-anchor: middle; dominant-baseline: middle; }
      .subText { font: 400 17px "Noto Sans SC", "PingFang SC", "Microsoft YaHei", Arial, sans-serif; fill: #4b5563; text-anchor: middle; dominant-baseline: middle; }
      .edge { fill: none; stroke: #1f2937; stroke-width: 2.4; marker-end: url(#arrow); }
      .arrowHead { fill: #1f2937; }
      .edgeText { font: 600 18px "Noto Sans SC", "PingFang SC", "Microsoft YaHei", Arial, sans-serif; fill: #111827; text-anchor: middle; }
      .edgeSubText { font: 400 14px "Noto Sans SC", "PingFang SC", "Microsoft YaHei", Arial, sans-serif; fill: #4b5563; text-anchor: middle; }
    </style>
  </defs>

  <rect width="1200" height="360" fill="#ffffff"/>

  <rect x="90" y="95" width="220" height="82" class="box"/>
  <rect x="490" y="95" width="220" height="82" class="box"/>
  <rect x="890" y="95" width="220" height="82" class="box"/>

  <text x="200" y="127" class="label">Human</text>
  <text x="200" y="156" class="subText">人类研究者</text>
  <text x="600" y="127" class="label">LLM Agent</text>
  <text x="600" y="156" class="subText">代码生成与修复</text>
  <text x="1000" y="127" class="label">Lean 4</text>
  <text x="1000" y="156" class="subText">内核与构建反馈</text>

  <path d="M 310 116 L 490 116" class="edge"/>
  <polygon points="490,116 472,107 472,125" class="arrowHead"/>
  <text x="400" y="82" class="edgeSubText">task, guidance</text>
  <text x="400" y="102" class="edgeText">任务与指导</text>

  <path d="M 490 156 L 310 156" class="edge"/>
  <polygon points="310,156 328,147 328,165" class="arrowHead"/>
  <text x="400" y="208" class="edgeText">结果报告</text>
  <text x="400" y="232" class="edgeSubText">report</text>

  <path d="M 710 116 L 890 116" class="edge"/>
  <polygon points="890,116 872,107 872,125" class="arrowHead"/>
  <text x="800" y="82" class="edgeSubText">attempt</text>
  <text x="800" y="102" class="edgeText">证明尝试</text>

  <path d="M 890 156 L 710 156" class="edge"/>
  <polygon points="710,156 728,147 728,165" class="arrowHead"/>
  <text x="800" y="208" class="edgeText">错误与目标反馈</text>
  <text x="800" y="232" class="edgeSubText">feedback</text>

  <path d="M 200 177 C 205 290, 985 300, 1000 178" class="edge"/>
  <polygon points="1000,178 987,191 1005,198" class="arrowHead"/>
  <text x="600" y="306" class="edgeText">源码修改与人工审查</text>
  <text x="600" y="330" class="edgeSubText">direct source edits and review</text>
</svg>
